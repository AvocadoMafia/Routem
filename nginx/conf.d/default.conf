# -----------------------------------------------------------------------------
# Rate limit zones
#
# SNS 型アプリではトップページ初回ロードで 10〜20+ の GET が並列に飛ぶ上、
# 画面遷移や無限スクロールでさらに上乗せされる。旧設定 (120r/m, burst=60) は
# 一般的なユーザー操作でも簡単に 429 を引き起こすため、read / write で
# ゾーンを分離してそれぞれ現実的な値に緩和する。
#
#   - read  (GET/HEAD/OPTIONS)
#     rate=600r/m (=10 r/s) burst=120 nodelay
#   - write (POST/PUT/PATCH/DELETE)
#     rate=60r/m  (=1  r/s) burst=30  nodelay
#
# nginx の `limit_req_zone` は key 変数が空文字列のときゾーンを適用しない
# 仕様を利用し、method に応じて片方のゾーンだけを有効化している。
# -----------------------------------------------------------------------------
map $request_method $api_read_key {
    default    "";
    GET        $binary_remote_addr;
    HEAD       $binary_remote_addr;
    OPTIONS    $binary_remote_addr;
}

map $request_method $api_write_key {
    default    "";
    POST       $binary_remote_addr;
    PUT        $binary_remote_addr;
    PATCH      $binary_remote_addr;
    DELETE     $binary_remote_addr;
}

limit_req_zone $api_read_key  zone=api_read_limit:10m  rate=600r/m;
limit_req_zone $api_write_key zone=api_write_limit:10m rate=60r/m;

# 429 を warn ログに残して監視できるようにする
# (limit_req_log_level は location 内で指定)

server {
    listen 80;

    # -------------------------------------------------------------------------
    # HTTPS 化の下準備 (証明書を配置するまでは 80 のみ listen する)
    #
    # 本番で以下を有効化するには:
    #   1. Let's Encrypt 等で証明書を取得し、 `./nginx/ssl/live/routem.net/`
    #      以下に `fullchain.pem` / `privkey.pem` を配置する
    #      (docker-compose-prod.yml の volume コメントを外して nginx コンテナにマウントする)
    #   2. docker-compose-prod.yml の `- "443:443"` ポートマッピングのコメントを外す
    #   3. 下の `listen 443 ssl;` 〜 ssl 設定のコメントを外す
    #   4. 最下部の "HTTP → HTTPS リダイレクト用" サーバーブロックのコメントを外して
    #      この server ブロックから `listen 80;` 行を削除する
    #   5. nginx 再起動: `docker compose -f docker-compose-prod.yml restart nginx`
    #
    # cookie の Secure フラグは proxy.ts が X-Forwarded-Proto を見て動的に決めるので、
    # HTTPS が有効化された瞬間から自動で Secure が立ち、 HTTP の間は Secure 無しで
    # セッションが切れない挙動を維持する。
    # -------------------------------------------------------------------------
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/live/routem.net/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/live/routem.net/privkey.pem;
    #
    # # Mozilla Intermediate 推奨 (2026 現在)
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    # ssl_stapling        on;
    # ssl_stapling_verify on;
    #
    # # HSTS (一度有効化したら当面戻せないので慎重に。証明書が安定してから外す)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_name routem.net;

    # 429 の JSON 応答
    error_page 429 = @429;
    location @429 {
        default_type application/json;
        add_header Retry-After 5 always;
        return 429 '{"error":"Too Many Requests","code":"RATE_LIMITED"}';
    }

    # -------------------------------------------------------------------------
    # 共通プロキシヘッダー
    #
    # proxy.ts (Engineer_C 担当) で Cookie の Secure 判定に
    # X-Forwarded-Proto を参照するため、全 location で必ず渡す。
    # X-Forwarded-Host / X-Forwarded-For も Next.js のリクエスト解釈や
    # Supabase のリダイレクト URL 生成で参照されるので合わせて設定。
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Next.js の静的アセット (rate limit 対象外、アクセスログも静かに)
    location /_next/static/ {
        proxy_pass http://app:3000;
        access_log off;
    }

    # Next.js の画像最適化
    location /_next/image {
        proxy_pass http://app:3000;
    }

    # favicon
    location = /favicon.ico {
        proxy_pass http://app:3000;
        access_log off;
        log_not_found off;
    }

    # API (メソッドに応じて read/write どちらかのゾーンだけが効く)
    location /api/ {
        limit_req zone=api_read_limit  burst=120 nodelay;
        limit_req zone=api_write_limit burst=30  nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        proxy_pass http://app:3000;
    }

    # それ以外 (Next.js のページ・hydration 等)
    location / {
        proxy_pass http://app:3000;
    }
}

# -----------------------------------------------------------------------------
# HTTP → HTTPS リダイレクト用サーバーブロック (HTTPS 化後に有効化する)
#
# 有効化手順:
#   - 上の server ブロックから `listen 80;` を削除 (HTTPS 側で 443 を listen する)
#   - このブロックのコメントを外す
#   - これで http://routem.net/* へのアクセスが 301 で https://routem.net/* に飛ぶ
# -----------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name routem.net;
#     # Let's Encrypt HTTP-01 チャレンジを通したい場合は /.well-known/acme-challenge を
#     # webroot 等に逃がす設定をここに追加する。
#     return 301 https://$host$request_uri;
# }

