services:
  # proxy (dev でも同じ nginx 設定を確認したい場合に起動可能、
  # 本番は docker-compose-prod.yml を使用)
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # depends_on:
    #   - app
    restart: always

  # データベース(postgres)
  postgres:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  # Redis（キャッシュ / 推薦データ用）
  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server --console-address ":9001" /data
    volumes:
      - minio_dev_data:/data

  mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be available...';
      while ! (echo > /dev/tcp/minio/9000) 2>/dev/null; do
        sleep 2;
      done;
      echo 'MinIO is up! Proceeding with configuration.';
      /usr/bin/mc alias set minio_dev http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb minio_dev/rtmimages --region=${MINIO_REGION};
      /usr/bin/mc anonymous set public minio_dev/rtmimages;
      exit 0;
      "

  meilisearch:
    image: getmeili/meilisearch
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_APIKEY}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5050:5000"
    command: ["--load-only", "en,ja"]

volumes:
  postgres_data:
  meili_data:
  minio_dev_data:
  redis_data:
