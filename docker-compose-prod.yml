services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"
      # HTTPS 化手順については nginx/conf.d/default.conf 上部のコメントを参照。
      # 証明書配置後に下記 443 ポートと ssl ボリュームのコメントを同時に外す。
      # - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment after setting up SSL (see nginx/conf.d/default.conf)
    depends_on:
      - app
    networks:
      - routem-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* は Next.js がビルド時にクライアントバンドルへインライン化するため
      # すべて build-arg 経由で渡す必要がある（container の runtime env では反映されない）。
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN: ${NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    container_name: app
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - MEILISEARCH_APIKEY=${MEILISEARCH_APIKEY}
    depends_on:
      - postgres
      - redis
      - meilisearch
      - libretranslate
    networks:
      - routem-network
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - routem-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - routem-network
    restart: always

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_APIKEY}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_prod_data:/meili_data
    networks:
      - routem-network
    restart: always

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    command: ["--load-only", "en,ja"]
    networks:
      - routem-network
    restart: always

networks:
  routem-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  meili_prod_data:
