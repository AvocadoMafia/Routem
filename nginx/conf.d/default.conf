limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

server {
    listen 80;

    # SSL configuration (Commented out for initial state)
    # listen 443 ssl;
    # ssl_certificate /etc/nginx/ssl/live/routem.net/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/live/routem.net/privkey.pem;

    error_page 429 = @429;
    location @429 {
        default_type application/json;
        return 429 '{"error": "Too Many Requests"}';
    }

    server_name routem.net;

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
