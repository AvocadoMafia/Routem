# -----------------------------------------------------------------------------
# Rate limit zones
#
# SNS 型アプリではトップページ初回ロードで 10〜20+ の GET が並列に飛ぶ上、
# 画面遷移や無限スクロールでさらに上乗せされる。旧設定 (120r/m, burst=60) は
# 一般的なユーザー操作でも簡単に 429 を引き起こすため、read / write で
# ゾーンを分離してそれぞれ現実的な値に緩和する。
#
#   - read  (GET/HEAD/OPTIONS)
#     rate=600r/m (=10 r/s) burst=120 nodelay
#   - write (POST/PUT/PATCH/DELETE)
#     rate=60r/m  (=1  r/s) burst=30  nodelay
#
# nginx の `limit_req_zone` は key 変数が空文字列のときゾーンを適用しない
# 仕様を利用し、method に応じて片方のゾーンだけを有効化している。
# -----------------------------------------------------------------------------
map $request_method $api_read_key {
    default    "";
    GET        $binary_remote_addr;
    HEAD       $binary_remote_addr;
    OPTIONS    $binary_remote_addr;
}

map $request_method $api_write_key {
    default    "";
    POST       $binary_remote_addr;
    PUT        $binary_remote_addr;
    PATCH      $binary_remote_addr;
    DELETE     $binary_remote_addr;
}

limit_req_zone $api_read_key  zone=api_read_limit:10m  rate=600r/m;
limit_req_zone $api_write_key zone=api_write_limit:10m rate=60r/m;

# 429 を warn ログに残して監視できるようにする
# (limit_req_log_level は location 内で指定)

# -----------------------------------------------------------------------------
# HTTP → HTTPS リダイレクト
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name routem.net;
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------------------------
# HTTPS 本体
#
# 証明書は `./nginx/ssl/cert.pem` / `./nginx/ssl/key.pem` を
# docker-compose-prod.yml で `/etc/nginx/ssl/` にマウントして利用する。
#
# cookie の Secure フラグは proxy.ts が X-Forwarded-Proto を見て動的に決めるので、
# この HTTPS ブロック経由のリクエストでは自動で Secure が立つ。
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name routem.net;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Mozilla Intermediate 推奨 (2026 現在)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (一度有効化したら当面戻せないので慎重に)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 502 Bad Gateway 対策 (Supabase/OAuth 等の大きな Cookie/Header を許容)
    # /auth/callback では Set-Cookie が分割されて大量に積まれるため
    # 128k では `upstream sent too big header` で 502 が出ることが確認されており、
    # 余裕を持って 512k まで引き上げる。
    proxy_buffer_size       512k;
    proxy_buffers           8 512k;
    proxy_busy_buffers_size 1m;
    proxy_max_temp_file_size 0;

    # 429 の JSON 応答
    error_page 429 = @429;
    location @429 {
        default_type application/json;
        add_header Retry-After 5 always;
        return 429 '{"error":"Too Many Requests","code":"RATE_LIMITED"}';
    }

    # -------------------------------------------------------------------------
    # 共通プロキシヘッダー
    #
    # proxy.ts (Engineer_C 担当) で Cookie の Secure 判定に
    # X-Forwarded-Proto を参照するため、全 location で必ず渡す。
    # X-Forwarded-Host / X-Forwarded-For も Next.js のリクエスト解釈や
    # Supabase のリダイレクト URL 生成で参照されるので合わせて設定。
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # Next.js の静的アセット (rate limit 対象外、アクセスログも静かに)
    location /_next/static/ {
        proxy_pass http://app:3000;
        access_log off;
    }

    # Next.js の画像最適化
    location /_next/image {
        proxy_pass http://app:3000;
    }

    # favicon
    location = /favicon.ico {
        proxy_pass http://app:3000;
        access_log off;
        log_not_found off;
    }

    # OAuth コールバック (Set-Cookie が特に巨大になるため明示的に大きいバッファを与える)
    location /auth/callback {
        proxy_pass http://app:3000;
        proxy_buffer_size       512k;
        proxy_buffers           8 512k;
        proxy_busy_buffers_size 1m;
    }

    # API (メソッドに応じて read/write どちらかのゾーンだけが効く)
    location /api/ {
        limit_req zone=api_read_limit  burst=120 nodelay;
        limit_req zone=api_write_limit burst=30  nodelay;
        limit_req_status 429;
        limit_req_log_level warn;

        proxy_pass http://app:3000;
    }

    # それ以外 (Next.js のページ・hydration 等)
    location / {
        proxy_pass http://app:3000;
    }
}
